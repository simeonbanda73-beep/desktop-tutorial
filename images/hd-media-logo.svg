<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" opacity="0.15" stroke="#00d4ff" stroke-width="2"/>
  
  <!-- Camera Icon -->
  <g transform="translate(50, 60)">
    <!-- Camera Body -->
    <rect x="10" y="15" width="90" height="60" rx="5" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    
    <!-- Lens Circle -->
    <circle cx="55" cy="45" r="20" fill="none" stroke="#e94560" stroke-width="2.5"/>
    <circle cx="55" cy="45" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    
    <!-- Flash -->
    <rect x="15" y="18" width="12" height="8" rx="2" fill="#e94560" opacity="0.8"/>
    
    <!-- Viewfinder -->
    <rect x="75" y="20" width="8" height="8" fill="#00d4ff" opacity="0.6"/>
  </g>
  
  <!-- Video Play Button overlay -->
  <g transform="translate(100, 120)">
    <polygon points="0,-15 15,-8 15,8 0,15" fill="#e94560" opacity="0.9"/>
  </g>
  
  <!-- Text: HD Media -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">HD MEDIA</text>
  
  <!-- Subtext: Photography & Videography -->
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#00d4ff" opacity="0.8">PHOTOGRAPHY & VIDEOGRAPHY</text>
  
  <!-- Decorative elements -->
  <circle cx="20" cy="20" r="3" fill="#e94560" opacity="0.6"/>
  <circle cx="180" cy="180" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="180" cy="20" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="20" cy="180" r="2" fill="#e94560" opacity="0.4"/>
</svg>
